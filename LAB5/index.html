<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>NBA Player Stats Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px;background-color: #ffecd6; }

    body.dark { background: #222; color: rgb(244, 150, 0); }
    body.dark table { background: #333; }
    body.dark input, body.dark select { background: #444; color: rgba(255, 255, 255, 0.427); }

    h1 { display: inline; }
    #darkToggle { float: right; padding: 5px 10px; cursor: pointer; }

    input, select { margin: 10px 5px 10px 0; padding: 5px; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; border: 1px solid #ccc; text-align: left; }
    th { background: #f0f0f0; cursor: pointer; }
    tbody tr:hover { background: #fffbea; }
  </style>
</head>
<body>

  <h1>NBA Player Stats Dashboard</h1>
  <button id="darkToggle">Toggle Dark Mode</button>

  <br/>
  <input type="text" id="searchInput" placeholder="Search players...."/>
  <select id="teamFilter">
    <option value="All">All</option>
  </select>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable('name')">Name</th>
        <th onclick="sortTable('team')">Team</th>
        <th onclick="sortTable('points')">Points</th>
        <th onclick="sortTable('rebounds')">Rebounds</th>
        <th onclick="sortTable('assists')">Assists</th>
      </tr>
    </thead>
    <tbody id="playerBody"></tbody>
  </table>

  <script>
    const players = [
      { name: "Joel Embiid",             team: "PHI", points: 33,   rebounds: 10.8, assists: 5.7 },
      { name: "Jalen Brunson",           team: "NYK", points: 32.4, rebounds: 3.3,  assists: 7.5 },
      { name: "Shai Gilgeous-Alexander", team: "OKC", points: 30.2, rebounds: 7.2,  assists: 6.4 },
      { name: "Tyrese Maxey",            team: "PHI", points: 29.8, rebounds: 5.2,  assists: 6.8 },
      { name: "Donovan Mitchell",        team: "CLE", points: 29.6, rebounds: 5.4,  assists: 4.7 },
    ];

    let sortCol = "name";
    let sortDir = "asc";

    const teams = [...new Set(players.map(p => p.team))];
    teams.forEach(t => {
      teamFilter.innerHTML += `<option value="${t}">${t}</option>`;
    });

    function render() {
      const query = searchInput.value.toLowerCase();
      const team  = teamFilter.value;

      let list = players.filter(p =>
        p.name.toLowerCase().includes(query) &&
        (team === "All" || p.team === team)
      );

      list.sort((a, b) => {
        if (a[sortCol] < b[sortCol]) return sortDir === "asc" ? -1 : 1;
        if (a[sortCol] > b[sortCol]) return sortDir === "asc" ?  1 : -1;
        return 0;
      });

      playerBody.innerHTML = list.map(p => `
        <tr>
          <td>${p.name}</td>
          <td>${p.team}</td>
          <td>${p.points}</td>
          <td>${p.rebounds}</td>
          <td>${p.assists}</td>
        </tr>
      `).join("");
    }

    function sortTable(col) {
      sortDir = (sortCol === col && sortDir === "asc") ? "desc" : "asc";
      sortCol = col;
      render();
    }

    searchInput.addEventListener("input", render);
    teamFilter.addEventListener("change", render);
    darkToggle.addEventListener("click", () => document.body.classList.toggle("dark"));

    render();
  </script>

</body>
</html>
